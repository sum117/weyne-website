<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    html,body{margin:0}
    body{background:#E7E1D3}
    ::selection{background:#EECAA0;color:#012C4B}
  </style>
</helmet>
<div id="mp" style="height:100vh;display:flex;flex-direction:column;font-family:'Jost',system-ui,sans-serif;color:#12314C;background:radial-gradient(130% 92% at 50% -6%, #F6F2EA 0%, #E9E3D5 58%, #DDD5C4 100%);overflow:hidden;">

  <div style="flex:none;display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;padding:18px clamp(16px,4vw,36px);">
    <div style="display:flex;flex-direction:column;gap:5px;">
      <div style="display:flex;align-items:center;gap:11px;">
        <span style="width:9px;height:9px;border-radius:50%;background:#069CFF;box-shadow:0 0 0 4px rgba(6,156,255,.16);flex:none;"></span>
        <span style="font:600 13.5px/1 'Jost';letter-spacing:.01em;color:#12314C;">Pré-visualização mobile — Weyne Representações</span>
      </div>
      <span style="font:500 11.5px/1.3 'Jost';color:#8a8069;letter-spacing:.02em;padding-left:20px;">Role dentro do aparelho para percorrer a página</span>
    </div>
    <div data-seg style="display:inline-flex;align-items:center;background:rgba(18,49,76,.055);border:1px solid rgba(18,49,76,.1);border-radius:999px;padding:4px;gap:2px;flex:none;">
      <button data-size="360" style="border:0;cursor:pointer;background:transparent;color:#12314C;font:600 12.5px/1 'Jost';padding:9px 15px;border-radius:999px;transition:.25s;">360</button>
      <button data-size="390" style="border:0;cursor:pointer;background:#fff;color:#034F83;font:600 12.5px/1 'Jost';padding:9px 15px;border-radius:999px;box-shadow:0 6px 14px -8px rgba(3,79,131,.5);transition:.25s;">390</button>
      <button data-size="430" style="border:0;cursor:pointer;background:transparent;color:#12314C;font:600 12.5px/1 'Jost';padding:9px 15px;border-radius:999px;transition:.25s;">430</button>
    </div>
  </div>

  <div style="flex:1;min-height:0;display:flex;align-items:flex-start;justify-content:center;padding:4px 16px 24px;">
    <div data-scaler style="transform-origin:top center;">
      <div data-device style="position:relative;display:block;padding:15px;background:linear-gradient(158deg,#26292f 0%,#141519 52%,#0c0d10 100%);border-radius:58px;box-shadow:0 2px 3px rgba(255,255,255,.22) inset, 0 0 0 1px rgba(0,0,0,.35), 0 54px 90px -32px rgba(24,32,46,.55), 0 22px 42px -22px rgba(24,32,46,.42);">
        <div style="position:relative;border-radius:43px;overflow:hidden;background:#000;box-shadow:0 0 0 2px rgba(0,0,0,.6);">
          <iframe data-frame src="Weyne%20Representacoes.dc.html" title="Weyne Representações — versão mobile" style="display:block;width:390px;height:812px;border:0;background:#012C4B;"></iframe>
          <div style="position:absolute;top:11px;left:50%;transform:translateX(-50%);width:112px;height:32px;background:#08090b;border-radius:999px;z-index:5;pointer-events:none;box-shadow:inset 0 0 0 1px rgba(255,255,255,.04), 0 1px 3px rgba(0,0,0,.5);"></div>
          <div style="position:absolute;top:21px;right:calc(50% - 42px);width:9px;height:9px;border-radius:50%;background:radial-gradient(circle at 40% 35%, #2b3550, #05070c 70%);z-index:6;pointer-events:none;"></div>
          <div aria-hidden="true" style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:36%;max-width:138px;height:5px;border-radius:999px;background:rgba(255,255,255,.55);z-index:6;pointer-events:none;"></div>
        </div>
      </div>
    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount(){ this._wire(); }
  _root(){ return document.getElementById('mp'); }
  _wire(){
    if(this._wired) return; this._wired = true;
    const root = this._root(); if(!root) return;
    const seg = root.querySelector('[data-seg]');
    const frame = root.querySelector('[data-frame]');
    const scaler = root.querySelector('[data-scaler]');
    const device = root.querySelector('[data-device]');
    if(!seg || !frame || !scaler || !device) return;
    const buttons = [...seg.querySelectorAll('button')];

    const setActive = (w) => {
      buttons.forEach(b => {
        const on = b.getAttribute('data-size') === String(w);
        b.style.background = on ? '#fff' : 'transparent';
        b.style.color = on ? '#034F83' : '#12314C';
        b.style.boxShadow = on ? '0 6px 14px -8px rgba(3,79,131,.5)' : 'none';
      });
    };
    const fit = () => {
      root.style.height = window.innerHeight + 'px';
      scaler.style.transform = 'scale(1)';
      const stage = scaler.parentElement;
      const avail = stage.clientHeight - 8;
      const dh = device.getBoundingClientRect().height;
      let s = dh > 0 ? avail / dh : 1;
      s = Math.max(0.36, Math.min(1, s));
      scaler.style.transform = 'scale(' + s.toFixed(3) + ')';
    };
    const setSize = (w) => { frame.style.width = w + 'px'; setActive(w); requestAnimationFrame(fit); };

    buttons.forEach(b => b.addEventListener('click', () => setSize(parseInt(b.getAttribute('data-size'), 10))));
    setActive(390);
    fit();
    requestAnimationFrame(fit);
    window.addEventListener('resize', fit);
    frame.addEventListener('load', () => requestAnimationFrame(fit));
  }
  renderVals(){ return {}; }
}
</script>
</body>
</html>
